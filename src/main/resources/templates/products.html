<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>All Products</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:linear-gradient(135deg,#eef2f3,#d9e4f5);
    min-height:100vh;
}

.container{
    margin-top:40px;
}

.card{
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.card-header{
    background:linear-gradient(45deg,#0d6efd,#4f8cff);
    color:white;
    text-align:center;
    padding:20px;
}

.card-header h2{
    margin:0;
    font-weight:700;
}

.table thead th{
    background:#0d6efd;
    color:white;
    text-align:center;
}

.table tbody td{
    text-align:center;
    vertical-align:middle;
}

.table tbody tr:hover{
    background:#f1f7ff;
    transition:0.3s;
}

.alert{
    border-radius:12px;
    font-size:16px;
    font-weight:600;
}

.badge-category{
    background:#0d6efd;
    color:white;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
}

.price{
    font-weight:bold;
    color:#198754;
}

.qty{
    font-weight:bold;
    color:#fd7e14;
}

.total-count{
    text-align:center;
    margin:15px 0;
}

.btn-add{
    float:right;
    margin-bottom:15px;
}

.action-btns{
    display:flex;
    gap:5px;
    justify-content:center;
}
.pagination {
    display: flex;
    justify-content: center;
    margin-top: 20px;
    gap: 10px;
}

.pagination a {
    padding: 8px 15px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    border: 1px solid #0d6efd;
    color: #0d6efd;
    transition: 0.3s;
}

.pagination a:hover {
    background: #0d6efd;
    color: white;
}

.pagination a.disabled {
    pointer-events: none;
    opacity: 0.5;
    border-color: #ccc;
    color: #999;
}

.no-data{
    color:red;
    font-size:18px;
    font-weight:bold;
    text-align:center;
}
</style>

</head>
<body>

<div class="container">

    <!-- Success Message -->
    <div th:if="${msg}"
         class="alert alert-success alert-dismissible fade show"
         role="alert">

        <strong th:text="${msg}"></strong>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="alert"></button>

    </div>

    <div class="card">

        <div class="card-header">
            <h2>📦 Product Management System</h2>
        </div>

        <div class="p-4">

            <a th:href="@{/product-form}" class="btn btn-primary btn-add">
                + Add Product
            </a>

            <h5 class="total-count">
                Total Products :
                <span class="badge bg-primary"
                      th:text="${#lists.size(products)}"></span>
            </h5>

            <table class="table table-bordered table-hover table-striped">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Product Name</th>
                        <th>Price</th>
                        <th>Category</th>
                        <th>Quantity</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="product : ${products}">

                        <td th:text="${product.id}"></td>

                        <td th:text="${product.name}"></td>

                        <td>
                            ₹ <span class="price"
                                    th:text="${product.price}"></span>
                        </td>

                        <td>
                            <span class="badge-category"
                                  th:text="${product.category}">
                            </span>
                        </td>

                        <td>
                            <span class="qty"
                                  th:text="${product.qty}">
                            </span>
                        </td>

                       <td>
    <div class="action-btns">
        
        <a th:href="@{'/update/' + ${product.id}}" class="btn btn-warning btn-sm">
            ✏ Update
        </a>

        <a th:href="@{/delete/{id}(id=${product.id})}"
           class="btn btn-danger btn-sm"
           onclick="return confirm('Are you sure you want to delete this product?')">
            🗑 Delete
        </a>
    </div>
</td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="6" class="no-data">
                            No Products Available
                        </td>
                    </tr>

                </tbody>

            </table>
<div class="pagination">

    <a th:if="${currentPage > 0}"
       th:href="@{/products(page=${currentPage - 1})}">
        ⬅ Previous
    </a>

    <a th:if="${products.size() > 0}"
       th:href="@{/products(page=${currentPage + 1})}">
        Next ➡
    </a>

</div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
