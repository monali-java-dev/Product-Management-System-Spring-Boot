<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Update Product</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:750px;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    padding:12px;
    border:1px solid #ddd;
}

td:first-child{
    width:30%;
    font-weight:bold;
    background:#f8f9fa;
}

input,
select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

.error{
    color:red;
    font-size:14px;
    margin-top:5px;
}

.button-group{
    display:flex;
    gap:10px;
}

.save-btn{
    flex:1;
    background:#007bff;
    color:white;
    border:none;
    padding:12px;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.save-btn:hover{
    background:#0056b3;
}

.all-products-btn{
    flex:1;
    text-decoration:none;
    text-align:center;
    background:#28a745;
    color:white;
    padding:12px;
    border-radius:5px;
    font-size:16px;
    font-weight:bold;
}

.all-products-btn:hover{
    background:#218838;
}
</style>

</head>

<body>

<div class="container">

    <h2>📦 Update Product</h2>

    <form th:action="@{/save}"
          th:object="${product}"
          method="post">

        <!-- Hidden ID (IMPORTANT for update) -->
        <input type="hidden" th:field="*{id}">

        <table>

            <tr>
                <td>Product Name</td>
                <td>
                    <input type="text" th:field="*{name}" placeholder="Enter Product Name">
                    <p class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                </td>
            </tr>

            <tr>
                <td>Product Price</td>
                <td>
                    <input type="number" step="0.01" th:field="*{price}" placeholder="Enter Product Price">
                    <p class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></p>
                </td>
            </tr>

            <tr>
                <td>Category</td>
                <td>
                    <select th:field="*{category}">
                        <option value="">-- Select Category --</option>
                        <option value="Electronic">Electronic</option>
                        <option value="Cloths">Cloths</option>
                        <option value="Grocery">Grocery</option>
                        <option value="Stationary">Stationary</option>
                        <option value="Other">Other</option>
                    </select>

                    <p class="error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></p>
                </td>
            </tr>

            <tr>
                <td>Quantity</td>
                <td>
                    <input type="number" th:field="*{qty}" placeholder="Enter Quantity">
                    <p class="error" th:if="${#fields.hasErrors('qty')}" th:errors="*{qty}"></p>
                </td>
            </tr>

            <tr>
                <td colspan="2">
                    <div class="button-group">

                        <!-- SAVE / UPDATE -->
                        <button type="submit" class="save-btn">
                            💾 Update Product
                        </button>

                        <!-- BACK TO LIST -->
                        <a th:href="@{/products}" class="all-products-btn">
                            📋 All Products
                        </a>

                    </div>
                </td>
            </tr>

        </table>

    </form>

</div>

</body>
</html>
